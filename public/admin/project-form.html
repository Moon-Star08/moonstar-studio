<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Add project — Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-shell">
  <div class="admin-topbar">
    <span class="admin-topbar__title"><span class="dot"></span>MOONSTAR STUDIO — Admin</span>
    <div style="display:flex; gap:10px; align-items:center;">
      <a class="btn btn--sm" href="/admin/dashboard.html">&larr; Back to dashboard</a>
    </div>
  </div>

  <main class="admin-main">
    <h1 id="form-heading" style="margin-bottom: 24px;">Add new project</h1>

    <div id="form-alert"></div>

    <form id="project-form" novalidate>
      <div class="field">
        <label for="title">Title *</label>
        <input type="text" id="title" name="title" maxlength="120" required>
      </div>

      <div class="field">
        <label for="short_description">Short description *</label>
        <input type="text" id="short_description" name="short_description" maxlength="240" required>
        <span class="hint">Shown on cards in the Work / Websites grid. Max 240 characters.</span>
      </div>

      <div class="field">
        <label for="long_description">Long description</label>
        <textarea id="long_description" name="long_description" maxlength="5000"></textarea>
        <span class="hint">Optional — full write-up, shown on a project detail view if you add one later.</span>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="category">Category *</label>
          <select id="category" name="category" required>
            <option value="project">Project</option>
            <option value="website">Website</option>
          </select>
        </div>
        <div class="field">
          <label for="tech_tags">Tech tags</label>
          <input type="text" id="tech_tags" name="tech_tags" placeholder="react, node, sqlite">
          <span class="hint">Comma-separated</span>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="live_url">Live URL</label>
          <input type="url" id="live_url" name="live_url" placeholder="https://example.com">
        </div>
        <div class="field">
          <label for="github_url">GitHub URL</label>
          <input type="url" id="github_url" name="github_url" placeholder="https://github.com/you/repo">
        </div>
      </div>

      <div class="field">
        <label for="image">Screenshot</label>
        <input type="file" id="image" name="image" accept="image/png,image/jpeg,image/webp,image/gif,image/svg+xml">
        <span class="hint">Images only, max 5MB.</span>
        <div id="current-image" class="current-image"></div>
      </div>

      <div class="field field-checkbox">
        <input type="checkbox" id="featured" name="featured">
        <label for="featured" style="margin:0;">Featured on homepage</label>
      </div>

      <div class="form-actions">
        <button class="btn btn--primary" type="submit" id="submit-btn">Save project</button>
        <a class="btn" href="/admin/dashboard.html">Cancel</a>
      </div>
    </form>
  </main>
</div>

<script src="/js/admin/project-form.js"></script>
</body>
</html>
